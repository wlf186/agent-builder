name: Harness validation

on:
  workflow_dispatch:
  pull_request:
  push:
    branches: [main]
  schedule:
    - cron: "41 4 * * 1"

permissions:
  contents: read

concurrency:
  group: harness-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Assert a clean source checkout
        run: |
          test ! -e .venv
          test ! -e .tools
          test ! -e .runtime
          test ! -e _legacy-reference
          test ! -e references/claude-code/materials

      - name: Validate shell entrypoints
        run: bash -n env.sh bootstrap.sh start.sh stop.sh purge.sh governance.sh

      - name: Bootstrap the checkout-local environment
        run: ./bootstrap.sh

      - name: Run the complete runtime test suite
        run: |
          source ./env.sh
          ./.venv/bin/python -m pytest

      - name: Run documentation and repository governance
        run: ./governance.sh

      - name: Audit the deployed Python environment
        run: |
          source ./env.sh
          ./.tools/uv tool run --from pip-audit==2.10.1 pip-audit \
            --path .venv/lib/python3.11/site-packages \
            --progress-spinner off
